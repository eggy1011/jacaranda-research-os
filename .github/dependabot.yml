version: 2
updates:
  - package-ecosystem: npm
    # pnpm workspace: the lockfile lives at the repo root; pointing at
    # /apps/web makes Dependabot skip pnpm-lock.yaml and every npm PR fails
    # CI at 'pnpm install --frozen-lockfile' (see PR #17).
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      web-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      api-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
