name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  api:
    name: API checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src tests
      - run: pytest

  compose:
    name: Compose runtime smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure ephemeral database password
        shell: bash
        run: |
          password="$(openssl rand -hex 24)"
          echo "::add-mask::$password"
          printf 'POSTGRES_PASSWORD=%s\n' "$password" >> "$GITHUB_ENV"
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build and start development stack
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: Verify runtime endpoints
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/health
          curl --fail --silent --show-error http://127.0.0.1:3000/api/health
          curl --fail --silent --show-error http://127.0.0.1:3000/
      - name: Print container logs after failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop development stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
